<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="icon" href="./favicons/masterball.png">
    <link rel="stylesheet" href="./index.css">

    <script defer src="./index.js"></script>

</head>

<body>
    

<main>

<img src="./img/pokedex.png" alt="Pokedex" class="pokedex-image">

<img src="#" alt="pokemon" class="pokemon__image">
    
<h1 class="pokemon__data">
    <span class="pokemon__number"></span>
     <span class="pokemon__name"></span>
</h1>

<form class="form">
    <input type="search"
    class="input__search"
    placeholder="Name or number"
    required
    />
</form>

<div class="buttons">
    <button class="button buttonprev">Prev &lt;</button>
    <button class="button buttonnext">Next &gt;</button>
</div>

</main>

</body>
</html>
